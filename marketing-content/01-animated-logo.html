<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundi Finance - Animated Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a1a12;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  .logo-container {
    position: relative;
    width: 600px;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Background glow */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,122,77,0.3) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.4); opacity: 0.8; }
  }

  /* Particle ring */
  .particles {
    position: absolute;
    width: 400px;
    height: 400px;
  }

  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #FFB612;
    opacity: 0;
    animation: orbit 4s linear infinite;
  }

  .particle:nth-child(1) { animation-delay: 0s; top: 0; left: 50%; }
  .particle:nth-child(2) { animation-delay: 0.5s; top: 15%; left: 85%; }
  .particle:nth-child(3) { animation-delay: 1s; top: 50%; left: 100%; }
  .particle:nth-child(4) { animation-delay: 1.5s; top: 85%; left: 85%; }
  .particle:nth-child(5) { animation-delay: 2s; top: 100%; left: 50%; }
  .particle:nth-child(6) { animation-delay: 2.5s; top: 85%; left: 15%; }
  .particle:nth-child(7) { animation-delay: 3s; top: 50%; left: 0%; }
  .particle:nth-child(8) { animation-delay: 3.5s; top: 15%; left: 15%; }

  @keyframes orbit {
    0% { opacity: 0; transform: scale(0); }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0) translateY(-20px); }
  }

  /* Main logo group */
  .logo-main {
    position: relative;
    z-index: 10;
    text-align: center;
    animation: logo-entrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
    transform: scale(0.3) translateY(40px);
  }

  @keyframes logo-entrance {
    0% { opacity: 0; transform: scale(0.3) translateY(40px); }
    60% { opacity: 1; transform: scale(1.05) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Bull icon */
  .bull-icon {
    width: 140px;
    height: 140px;
    margin: 0 auto 10px;
    position: relative;
  }

  .bull-body {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Chart line behind bull */
  .chart-line {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    height: 80px;
  }

  .chart-line svg {
    width: 100%;
    height: 100%;
  }

  .chart-path {
    stroke: #007A4D;
    stroke-width: 3;
    fill: none;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: draw-chart 1.5s ease-out 0.5s forwards;
  }

  .chart-fill {
    fill: url(#chartGrad);
    opacity: 0;
    animation: fade-in 1s ease-out 1.2s forwards;
  }

  @keyframes draw-chart {
    to { stroke-dashoffset: 0; }
  }

  /* Bull SVG */
  .bull-svg {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    animation: bull-charge 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    opacity: 0;
    transform-origin: center bottom;
  }

  @keyframes bull-charge {
    0% { opacity: 0; transform: translateX(-80%) scale(0.5) rotate(-10deg); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.1) rotate(3deg); }
    100% { opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); }
  }

  /* Arrow going up */
  .arrow-up {
    position: absolute;
    top: 0;
    right: 15px;
    opacity: 0;
    animation: arrow-shoot 0.6s ease-out 1.2s forwards;
  }

  @keyframes arrow-shoot {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Brand text */
  .brand-name {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .brand-name .fundi {
    color: #007A4D;
    display: inline-block;
    animation: text-reveal 0.6s ease-out 0.8s forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  .brand-sub {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #FFB612;
    display: block;
    animation: text-reveal 0.6s ease-out 1s forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  @keyframes text-reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tagline */
  .tagline {
    margin-top: 20px;
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 1s ease-out 1.6s forwards;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #FFB612;
    border-radius: 50%;
    opacity: 0;
  }

  .sparkle:nth-child(1) { top: 80px; left: 120px; animation: sparkle 2s ease-in-out 1.8s infinite; }
  .sparkle:nth-child(2) { top: 60px; right: 130px; animation: sparkle 2s ease-in-out 2.1s infinite; }
  .sparkle:nth-child(3) { top: 120px; left: 90px; animation: sparkle 2s ease-in-out 2.4s infinite; }
  .sparkle:nth-child(4) { top: 100px; right: 100px; animation: sparkle 2s ease-in-out 2.7s infinite; }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* Coin float animation */
  .coin {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid #FFB612;
    color: #FFB612;
    font-size: 16px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  .coin:nth-child(1) { top: 50px; left: 60px; animation: coin-float 3s ease-in-out 2s infinite; }
  .coin:nth-child(2) { top: 30px; right: 70px; animation: coin-float 3s ease-in-out 2.5s infinite; }
  .coin:nth-child(3) { bottom: 120px; left: 40px; animation: coin-float 3s ease-in-out 3s infinite; }

  @keyframes coin-float {
    0%, 100% { opacity: 0; transform: translateY(10px) rotateY(0deg); }
    25% { opacity: 0.8; transform: translateY(-10px) rotateY(90deg); }
    50% { opacity: 1; transform: translateY(-20px) rotateY(180deg); }
    75% { opacity: 0.8; transform: translateY(-10px) rotateY(270deg); }
  }

  /* Background grid */
  .bg-grid {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(rgba(0,122,77,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,122,77,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="logo-container">
    <div class="glow"></div>

    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="coin">R</div>
    <div class="coin">R</div>
    <div class="coin">R</div>

    <div class="logo-main">
      <div class="bull-icon">
        <div class="chart-line">
          <svg viewBox="0 0 140 80">
            <defs>
              <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#007A4D;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#007A4D;stop-opacity:0" />
              </linearGradient>
            </defs>
            <path class="chart-fill" d="M0,70 L20,60 L40,65 L60,45 L80,50 L100,25 L120,15 L140,5 L140,80 L0,80 Z" />
            <path class="chart-path" d="M0,70 L20,60 L40,65 L60,45 L80,50 L100,25 L120,15 L140,5" />
          </svg>
        </div>

        <svg class="bull-svg" viewBox="0 0 100 100" fill="none">
          <!-- Bull body -->
          <ellipse cx="50" cy="58" rx="28" ry="22" fill="#007A4D"/>
          <!-- Bull head -->
          <circle cx="50" cy="35" r="18" fill="#007A4D"/>
          <!-- Horns -->
          <path d="M32,30 Q25,15 20,10" stroke="#FFB612" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M68,30 Q75,15 80,10" stroke="#FFB612" stroke-width="4" stroke-linecap="round" fill="none"/>
          <!-- Eyes -->
          <circle cx="43" cy="33" r="3" fill="white"/>
          <circle cx="57" cy="33" r="3" fill="white"/>
          <circle cx="44" cy="33" r="1.5" fill="#0a1a12"/>
          <circle cx="58" cy="33" r="1.5" fill="#0a1a12"/>
          <!-- Nostrils -->
          <circle cx="47" cy="42" r="2" fill="#005a38"/>
          <circle cx="53" cy="42" r="2" fill="#005a38"/>
          <!-- Legs -->
          <rect x="30" y="72" width="6" height="18" rx="3" fill="#005a38"/>
          <rect x="42" y="72" width="6" height="18" rx="3" fill="#005a38"/>
          <rect x="54" y="72" width="6" height="18" rx="3" fill="#005a38"/>
          <rect x="66" y="72" width="6" height="18" rx="3" fill="#005a38"/>
          <!-- Tail -->
          <path d="M22,55 Q12,45 15,38" stroke="#005a38" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>

        <svg class="arrow-up" width="24" height="40" viewBox="0 0 24 40">
          <path d="M12,40 L12,8" stroke="#FFB612" stroke-width="3" stroke-linecap="round"/>
          <path d="M4,16 L12,4 L20,16" stroke="#FFB612" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

      <div class="brand-name">
        <span class="fundi">FUNDI</span>
      </div>
      <span class="brand-sub">FINANCE</span>

      <div class="tagline">Learn Money. Master Life.</div>
    </div>
  </div>
</body>
</html>
