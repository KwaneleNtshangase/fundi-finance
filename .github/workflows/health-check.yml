name: Health Check — Fundi Finance

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health:
    name: Site health check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run health-check script
        run: node scripts/health-check.js
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://fundiapp.co.za' }}

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-screenshot
          path: health-check-screenshot.png
          retention-days: 7

      - name: Notify on failure (GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Health Check Failed — ${new Date().toISOString().slice(0,10)}`;
            const body = `The automated health check detected a problem with the Fundi Finance app.\n\nSee the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details and screenshots.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure'
            });
            const today = new Date().toISOString().slice(0,10);
            const existing = issues.data.find(i => i.title.includes(today));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['health-check-failure', 'bug']
              });
            }
